---
- name: Configure Docker host and deploy FastAPI application
  hosts: app_servers
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker apt signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_directory }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy application source
      ansible.builtin.copy:
        src: ../app/
        dest: "{{ app_directory }}/"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        directory_mode: "0755"

    - name: Render application environment file
      ansible.builtin.template:
        src: templates/app.env.j2
        dest: "{{ app_directory }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    - name: Build and start containers
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: "{{ app_directory }}"
      changed_when: true

    - name: Wait for API health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/health"
        status_code: 200
      register: health_check
      retries: 12
      delay: 5
      until: health_check.status == 200

    - name: Show application URL
      ansible.builtin.debug:
        msg: "Application is healthy at http://{{ ansible_host }}:{{ app_port }}"
